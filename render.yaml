services:
  # Backend API Service
  - type: web
    name: tally-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    # Add your other env vars from Render dashboard

  # Frontend Static Site
  - type: web
    name: tally-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
    # SPA Routing - Redirect all routes to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
